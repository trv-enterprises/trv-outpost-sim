# Simulator Services
# Project: simulators
# Port range: 21xxx
#
# For local development: copy .env.example to .env and configure
# For LXD deployment: use trv-homelab/simulators Ansible playbook

services:
  # ts-store - Time-series circular buffer store
  # Production: uses GHCR image (set TSSTORE_IMAGE in .env)
  # Local dev: set TSSTORE_IMAGE=tsstore-local and build with: docker build -t tsstore-local ../ts-store
  tsstore:
    image: ${TSSTORE_IMAGE:-ghcr.io/trv-enterprises/ts-store:latest}
    container_name: simulators-tsstore
    ports:
      - "${TSSTORE_PORT:-21080}:${TSSTORE_INTERNAL_PORT:-8080}"
    volumes:
      - tsstore-data:/data
      - tsstore-run:/var/run/tsstore
    environment:
      - TSSTORE_MODE=release
      - TSSTORE_ADMIN_KEY=${TSSTORE_ADMIN_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--output-document=/dev/null", "http://localhost:${TSSTORE_INTERNAL_PORT:-8080}/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - simulators_network
    labels:
      - "project=simulators"

  # PostgreSQL database with timeseries data
  postgres:
    image: postgres:15-alpine
    container_name: simulators-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sensors}
    ports:
      - "21432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-seed/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - simulators_network
    labels:
      - "project=simulators"

  # Database seeder - seeds historical data (runs once)
  db-seeder:
    build:
      context: .
      dockerfile: Dockerfile.seeder
    container_name: simulators-db-seeder
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-sensors}
      NUM_SENSORS: ${NUM_SENSORS:-10}
      DAYS_BACK: ${DAYS_BACK:-7}
      INTERVAL_SECONDS: ${INTERVAL_SECONDS:-60}
      LAB_CONTROL_DAYS: ${LAB_CONTROL_DAYS:-30}
    networks:
      - simulators_network
    labels:
      - "project=simulators"

  # WebSocket sensor simulator - standalone data generation
  websocket-simulator:
    build:
      context: .
      dockerfile: Dockerfile.websocket
    container_name: simulators-websocket
    ports:
      - "21081:8081"
    environment:
      WS_PORT: 8081
      WS_INTERVAL_MS: ${WS_INTERVAL_MS:-1000}
      WS_NUM_SENSORS: ${WS_NUM_SENSORS:-50}
      WS_ENABLE_NOISE: ${WS_ENABLE_NOISE:-true}
      WS_ANOMALY_RATE: ${WS_ANOMALY_RATE:-0.002}
    healthcheck:
      test: ["CMD", "wget", "-q", "--output-document=/dev/null", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - simulators_network
    labels:
      - "project=simulators"

  # REST API sensor simulator
  rest-api-simulator:
    build:
      context: .
      dockerfile: Dockerfile.restapi
    container_name: simulators-rest-api
    ports:
      - "21082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      API_PORT: 8082
      API_BUFFER_SIZE: ${API_BUFFER_SIZE:-1000}
      API_GENERATE_MS: ${API_GENERATE_MS:-5000}
      POSTGRES_DSN: "host=postgres port=5432 user=${POSTGRES_USER:-postgres} password=${POSTGRES_PASSWORD:-postgres} dbname=${POSTGRES_DB:-sensors} sslmode=disable"
    healthcheck:
      test: ["CMD", "wget", "-q", "--output-document=/dev/null", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - simulators_network
    labels:
      - "project=simulators"

  # Static file server for CSV
  csv-server:
    image: nginx:alpine
    container_name: simulators-csv-server
    ports:
      - "21083:80"
    volumes:
      - ./data:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - simulators_network
    labels:
      - "project=simulators"

  # Data writer - generates sensor data and writes to ts-store
  data-writer:
    build:
      context: ./data-writer
      dockerfile: Dockerfile
    container_name: simulators-data-writer
    depends_on:
      tsstore:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      TSSTORE_URL: http://tsstore:${TSSTORE_INTERNAL_PORT:-8080}
      TSSTORE_API_KEY: ${TSSTORE_API_KEY}
      INTERVAL_MS: ${DATA_WRITER_INTERVAL_MS:-1000}
      ENABLE_NOISE: ${DATA_WRITER_NOISE:-true}
      ANOMALY_RATE: ${DATA_WRITER_ANOMALY_RATE:-0.002}
      POSTGRES_DSN: "host=postgres port=5432 user=${POSTGRES_USER:-postgres} password=${POSTGRES_PASSWORD:-postgres} dbname=${POSTGRES_DB:-sensors} sslmode=disable"
    restart: unless-stopped
    networks:
      - simulators_network
    labels:
      - "project=simulators"

  # Sensor-readings writer - combined row-per-sensor ("tidy") dataset.
  # Writes one record per sensor per tick to the single `sensor-readings`
  # schema store (location/sensor carried as fields). Runs ALONGSIDE
  # data-writer's three per-location stores; does not touch them.
  sensor-readings-writer:
    build:
      context: ./sensor-readings-writer
      dockerfile: Dockerfile
    container_name: simulators-sensor-readings-writer
    depends_on:
      tsstore:
        condition: service_healthy
    environment:
      TSSTORE_URL: http://tsstore:${TSSTORE_INTERNAL_PORT:-8080}
      TSSTORE_API_KEY: ${TSSTORE_API_KEY}
      INTERVAL_MS: ${SENSOR_READINGS_INTERVAL_MS:-1000}
      ENABLE_NOISE: ${SENSOR_READINGS_NOISE:-true}
      ANOMALY_RATE: ${SENSOR_READINGS_ANOMALY_RATE:-0.002}
    restart: unless-stopped
    networks:
      - simulators_network
    labels:
      - "project=simulators"

  # Traffic simulator - replays the AWS Honeypot dataset to drive the Outpost
  # 3D globe (echarts-gl attack arcs) and Sankey. Streams individual attack
  # events over WebSocket (/ws) in an accelerated continuous loop with fresh
  # timestamps (never runs dry), serves aggregated country->region flows at
  # /aggregate, and writes those flows to the `traffic-flows` ts-store schema
  # store for historical query. The store is created by the deploy.
  traffic-writer:
    build:
      context: ./traffic-writer
      dockerfile: Dockerfile
    container_name: simulators-traffic-writer
    ports:
      - "21084:8085"
    depends_on:
      tsstore:
        condition: service_healthy
    environment:
      TRAFFIC_PORT: 8085
      TRAFFIC_EVENTS_PER_SEC: ${TRAFFIC_EVENTS_PER_SEC:-50}
      TRAFFIC_STORE_NAME: ${TRAFFIC_STORE_NAME:-traffic-flows}
      TRAFFIC_AGG_WRITE_SEC: ${TRAFFIC_AGG_WRITE_SEC:-60}
      TSSTORE_URL: http://tsstore:${TSSTORE_INTERNAL_PORT:-8080}
      TSSTORE_API_KEY: ${TSSTORE_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "-q", "--output-document=/dev/null", "http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - simulators_network
    labels:
      - "project=simulators"

volumes:
  postgres_data:
  tsstore-data:
  tsstore-run:

networks:
  simulators_network:
    driver: bridge
    name: simulators_network

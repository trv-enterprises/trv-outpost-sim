<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Traffic-sim spike — globe + sankey preview</title>
  <style>
    body { margin: 0; background: #0b0b0f; color: #ddd; font: 14px system-ui, sans-serif; }
    h2 { margin: 16px; font-weight: 600; }
    .chart { width: 100%; height: 600px; }
    #globe { background: #000; }
    .note { margin: 8px 16px; color: #888; }
  </style>
  <!-- echarts + echarts-gl: same libs the dashboard already ships -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2/dist/echarts-gl.min.js"></script>
</head>
<body>
  <h2>3D Globe — weighted attack arcs (top-15 source countries → 9 honeypots)</h2>
  <p class="note">Basemap: earth_dark.png (dark world map + country borders, from make_basemap.py).</p>
  <div id="globe" class="chart"></div>

  <h2>Sankey — country → honeypot region, link width = attack volume</h2>
  <div id="sankey" class="chart"></div>

  <script>
    async function load(name) {
      const r = await fetch(name);
      return r.json();
    }
    (async () => {
      const globeCfg = await load('globe_config.json');
      const g = echarts.init(document.getElementById('globe'));
      g.setOption(globeCfg);

      const sankeyCfg = await load('sankey_config.json');
      const s = echarts.init(document.getElementById('sankey'));
      s.setOption(sankeyCfg);

      window.addEventListener('resize', () => { g.resize(); s.resize(); });
    })();
  </script>
</body>
</html>
